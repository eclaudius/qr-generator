<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e5df;
    --border-strong: #c8c4bc;
    --text: #1a1916;
    --text-muted: #6b6862;
    --text-faint: #9e9b96;
    --accent: #1a1916;
    --accent-hover: #333;
    --input-bg: #f5f3f0;
    --tag-bg: #eeecea;
    --tag-text: #3d3b38;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --radius: 10px;
    --font: 'Georgia', serif;
    --font-ui: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    padding: 48px 24px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 640px;
  }

  header {
    margin-bottom: 40px;
  }

  .wordmark {
    font-family: var(--font);
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  h1 {
    font-family: var(--font);
    font-size: 28px;
    font-weight: normal;
    color: var(--text);
    line-height: 1.3;
  }

  h1 em {
    font-style: italic;
    color: var(--text-muted);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 16px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-weight: 500;
  }

  input[type="text"], input[type="url"] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--input-bg);
    font-size: 14px;
    color: var(--text);
    font-family: var(--font-ui);
    transition: border-color 0.15s;
    outline: none;
  }

  input[type="text"]:focus, input[type="url"]:focus {
    border-color: var(--border-strong);
    background: var(--surface);
  }

  input::placeholder { color: var(--text-faint); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .url-preview {
    background: var(--tag-bg);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--tag-text);
    font-family: 'Courier New', monospace;
    word-break: break-all;
    line-height: 1.6;
    min-height: 38px;
    display: flex;
    align-items: center;
  }

  .url-preview.empty {
    color: var(--text-faint);
    font-family: var(--font-ui);
    font-size: 13px;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 11px 16px;
    border-radius: 7px;
    font-size: 14px;
    font-family: var(--font-ui);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid;
    text-align: center;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border-strong);
  }

  .btn-secondary:hover { background: var(--tag-bg); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .qr-section {
    display: none;
    text-align: center;
  }

  .qr-section.visible { display: block; }

  #qr-output {
    display: flex;
    justify-content: center;
    margin: 20px 0 16px;
  }

  #qr-output canvas, #qr-output img {
    border-radius: 8px;
  }

  .qr-meta {
    font-size: 12px;
    color: var(--text-faint);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: white;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-family: var(--font-ui);
    transition: transform 0.3s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .success-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--success-bg);
    color: var(--success-text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 4px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="wordmark">UTM + QR</div>
    <h1>Build a tagged link,<br><em>generate a code.</em></h1>
  </header>

  <div class="card">
    <div class="section-label">Destination</div>
    <div class="field">
      <label>Goal URL</label>
      <input type="url" id="url" placeholder="https://example.com/page" oninput="update()" />
    </div>

    <hr class="divider">

    <div class="section-label">UTM Parameters</div>
    <div class="field">
      <label>Source <span style="color:var(--text-faint)">(utm_source)</span></label>
      <input type="text" id="source" placeholder="google, newsletter, instagram…" oninput="update()" />
    </div>
    <div class="field">
      <label>Medium <span style="color:var(--text-faint)">(utm_medium)</span></label>
      <input type="text" id="medium" placeholder="cpc, email, social…" oninput="update()" />
    </div>
    <div class="field">
      <label>Campaign <span style="color:var(--text-faint)">(utm_campaign)</span></label>
      <input type="text" id="campaign" placeholder="spring-sale, product-launch…" oninput="update()" />
    </div>
    <div class="field">
      <label>Content <span style="color:var(--text-faint)">(utm_content)</span></label>
      <input type="text" id="content" placeholder="banner-a, hero-cta…" oninput="update()" />
    </div>
    <div class="field">
      <label>Term <span style="color:var(--text-faint)">(utm_term)</span></label>
      <input type="text" id="term" placeholder="running+shoes, free+trial…" oninput="update()" />
    </div>

    <hr class="divider">

    <div class="section-label">Tagged URL Preview</div>
    <div class="url-preview empty" id="preview">Fill in the fields above to see your tagged URL.</div>

    <div class="actions">
      <button class="btn btn-secondary" id="copy-btn" onclick="copyURL()" disabled>Copy URL</button>
      <button class="btn btn-primary" id="gen-btn" onclick="generate()" disabled>Generate QR</button>
    </div>
  </div>

  <div class="card qr-section" id="qr-card">
    <div class="section-label">Your QR Code</div>
    <div id="qr-output"></div>
    <div class="success-badge"><span class="dot"></span> Ready to scan</div>
    <div class="qr-meta" id="qr-meta" style="margin-top:8px;"></div>
    <div class="actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="downloadPNG()">Download PNG</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentURL = '';

function buildURL() {
  const base = document.getElementById('url').value.trim();
  if (!base) return '';
  let url;
  try { url = new URL(base); } catch(e) { return ''; }
  const params = {
    utm_source: document.getElementById('source').value.trim(),
    utm_medium: document.getElementById('medium').value.trim(),
    utm_campaign: document.getElementById('campaign').value.trim(),
    utm_content: document.getElementById('content').value.trim(),
    utm_term: document.getElementById('term').value.trim(),
  };
  for (const [k, v] of Object.entries(params)) {
    if (v) url.searchParams.set(k, v);
  }
  return url.toString();
}

function update() {
  const full = buildURL();
  const preview = document.getElementById('preview');
  const copyBtn = document.getElementById('copy-btn');
  const genBtn = document.getElementById('gen-btn');

  if (full) {
    preview.textContent = full;
    preview.classList.remove('empty');
    copyBtn.disabled = false;
    genBtn.disabled = false;
    currentURL = full;
  } else {
    preview.textContent = 'Fill in the fields above to see your tagged URL.';
    preview.classList.add('empty');
    copyBtn.disabled = true;
    genBtn.disabled = true;
    currentURL = '';
  }
}

function generate() {
  if (!currentURL) return;
  const output = document.getElementById('qr-output');
  output.innerHTML = '';
  new QRCode(output, {
    text: currentURL,
    width: 220,
    height: 220,
    colorDark: '#1a1916',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
  const card = document.getElementById('qr-card');
  card.classList.add('visible');
  const meta = document.getElementById('qr-meta');
  meta.textContent = 'Encodes ' + currentURL.length + ' characters';
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyURL() {
  if (!currentURL) return;
  navigator.clipboard.writeText(currentURL).then(() => showToast('URL copied to clipboard'));
}

function downloadPNG() {
  const canvas = document.querySelector('#qr-output canvas');
  if (!canvas) { showToast('Generate a QR code first'); return; }
  const link = document.createElement('a');
  link.download = 'qr-code.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('PNG downloaded');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
